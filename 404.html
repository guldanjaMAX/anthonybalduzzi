<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost in the Jungle | Dr. Anthony Balduzzi</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <meta name="theme-color" content="#0a0a08">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400&family=Inter:wght@300;400&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a08;
            color: #e8e0d0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 300;
            color: #f5f0e8;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1rem;
            font-weight: 300;
            color: #8a8578;
            max-width: 400px;
            line-height: 1.7;
            margin-bottom: 2rem;
        }
        a {
            font-size: 0.75rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: #d4872c;
            border: 1px solid #d4872c;
            padding: 1rem 2.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
        }
        a:hover { background: #d4872c; color: #0a0a08; }
    </style>
</head>
<body>
    <h1>Lost in the jungle.</h1>
    <p>The path you're looking for doesn't exist here. But the fire is still burning.</p>
    <a href="/">Return to the Fire</a>
</body>
</html>
